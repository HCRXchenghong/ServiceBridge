services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: customer_service
      POSTGRES_USER: customer_service
      POSTGRES_PASSWORD: customer_service_dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer_service -d customer_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend-1:
    image: golang:1.25
    working_dir: /app
    command: go run ./cmd/server
    environment:
      HTTP_ADDR: ":8080"
      APP_ENV: "dev"
      STORE_DRIVER: "postgres"
      DATABASE_URL: "postgres://customer_service:customer_service_dev@postgres:5432/customer_service?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-false}"
      UPLOAD_DRIVER: "${UPLOAD_DRIVER:-local}"
      UPLOAD_DIR: "/uploads"
      PUSH_WEBHOOK_URL: "${PUSH_WEBHOOK_URL:-}"
    volumes:
      - ../backend:/app
      - uploads-data:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend-2:
    image: golang:1.25
    working_dir: /app
    command: go run ./cmd/server
    environment:
      HTTP_ADDR: ":8080"
      APP_ENV: "dev"
      STORE_DRIVER: "postgres"
      DATABASE_URL: "postgres://customer_service:customer_service_dev@postgres:5432/customer_service?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-false}"
      UPLOAD_DRIVER: "${UPLOAD_DRIVER:-local}"
      UPLOAD_DIR: "/uploads"
      PUSH_WEBHOOK_URL: "${PUSH_WEBHOOK_URL:-}"
    volumes:
      - ../backend:/app
      - uploads-data:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/customer-service.conf:/etc/nginx/conf.d/default.conf:ro
      - ../apps/user-web:/usr/share/nginx/html/user-web:ro
    depends_on:
      - backend-1
      - backend-2

volumes:
  postgres-data:
  redis-data:
  uploads-data:
