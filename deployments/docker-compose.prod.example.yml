services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend-1:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8080"
      APP_ENV: "production"
      STORE_DRIVER: "postgres"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_ADDR: ${REDIS_ADDR}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      AGENT_BOOTSTRAP_PASSWORD: ${AGENT_BOOTSTRAP_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS}
      SECURITY_HEADERS: ${SECURITY_HEADERS}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST}
      METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_API_TYPE: ${OPENAI_API_TYPE}
      UPLOAD_DRIVER: ${UPLOAD_DRIVER}
      UPLOAD_DIR: "/uploads"
      UPLOAD_PUBLIC_BASE_URL: ${UPLOAD_PUBLIC_BASE_URL}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_SESSION_TOKEN: ${S3_SESSION_TOKEN}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      S3_KEY_PREFIX: ${S3_KEY_PREFIX}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      PUSH_WEBHOOK_URL: ${PUSH_WEBHOOK_URL}
      PUSH_WEBHOOK_BEARER_TOKEN: ${PUSH_WEBHOOK_BEARER_TOKEN}
      PUSH_WEBHOOK_TIMEOUT_SECONDS: ${PUSH_WEBHOOK_TIMEOUT_SECONDS}
      NODE_ID: "backend-1"
    volumes:
      - uploads-data:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend-2:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8080"
      APP_ENV: "production"
      STORE_DRIVER: "postgres"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_ADDR: ${REDIS_ADDR}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      AGENT_BOOTSTRAP_PASSWORD: ${AGENT_BOOTSTRAP_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS}
      SECURITY_HEADERS: ${SECURITY_HEADERS}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST}
      METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_API_TYPE: ${OPENAI_API_TYPE}
      UPLOAD_DRIVER: ${UPLOAD_DRIVER}
      UPLOAD_DIR: "/uploads"
      UPLOAD_PUBLIC_BASE_URL: ${UPLOAD_PUBLIC_BASE_URL}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_SESSION_TOKEN: ${S3_SESSION_TOKEN}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      S3_KEY_PREFIX: ${S3_KEY_PREFIX}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      PUSH_WEBHOOK_URL: ${PUSH_WEBHOOK_URL}
      PUSH_WEBHOOK_BEARER_TOKEN: ${PUSH_WEBHOOK_BEARER_TOKEN}
      PUSH_WEBHOOK_TIMEOUT_SECONDS: ${PUSH_WEBHOOK_TIMEOUT_SECONDS}
      NODE_ID: "backend-2"
    volumes:
      - uploads-data:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 12

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/customer-service.conf:/etc/nginx/conf.d/default.conf:ro
      - ../apps/user-web:/usr/share/nginx/html/user-web:ro
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  uploads-data:
