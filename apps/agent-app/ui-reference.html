<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>客服工作端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --wc-bg: #ededed;
            --wc-header: #ededed;
            --wc-footer: #f7f7f7;
            --wc-bubble-self: #95ec69; /* 客服自己发的消息绿色 */
            --wc-bubble-visitor: #ffffff; /* 访客发的消息白色 */
            --wc-text-main: #111111;
            --wc-text-muted: #b2b2b2;
            --wc-border: #d5d5d5;
            --app-theme: #07c160;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background-color: #333;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 气泡三角 */
        .bubble-left::before {
            content: ''; position: absolute; top: 14px; left: -5px;
            border-width: 5px 6px 5px 0; border-style: solid;
            border-color: transparent var(--wc-bubble-visitor) transparent transparent;
        }
        .bubble-right::before {
            content: ''; position: absolute; top: 14px; right: -5px;
            border-width: 5px 0 5px 6px; border-style: solid;
            border-color: transparent transparent transparent var(--wc-bubble-self);
        }

        textarea:focus, input:focus { outline: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }

        /* 页面容器基础样式 (模拟 App 路由页面) */
        .page-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--wc-bg); display: flex; flex-direction: column;
            will-change: transform;
        }

        /* 强制 Tailwind 配置 */
        .bg-wc-bg { background-color: var(--wc-bg); }
        .bg-wc-header { background-color: var(--wc-header); }
        .bg-wc-footer { background-color: var(--wc-footer); }
        .bg-wc-self { background-color: var(--wc-bubble-self); }
        .bg-wc-visitor { background-color: var(--wc-bubble-visitor); }
        .border-wc { border-color: var(--wc-border); }
        .text-wc-main { color: var(--wc-text-main); }
        
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="flex items-center justify-center h-screen w-screen relative">

    <!-- 模拟手机外壳 -->
    <div id="app-container" class="relative w-full h-full md:w-[400px] md:h-[800px] md:max-h-[95vh] md:rounded-xl md:shadow-2xl overflow-hidden bg-black flex flex-col">
        
        <!-- ==================== 登录页 ==================== -->
        <div id="view-login" class="page-view bg-white z-[60] flex items-center justify-center px-8">
            <div class="w-full max-w-sm flex flex-col items-center">
                <i class="fas fa-headset text-6xl text-[#07c160] mb-8"></i>
                <h1 class="text-2xl font-semibold mb-8 text-gray-800">客服工作台</h1>
                
                <div class="w-full space-y-4">
                    <div class="border-b border-gray-300 py-2 flex items-center">
                        <i class="far fa-user text-gray-400 w-6"></i>
                        <input type="text" id="login-user" value="admin" class="flex-1 text-lg py-1 px-2" placeholder="账号">
                    </div>
                    <div class="border-b border-gray-300 py-2 flex items-center">
                        <i class="fas fa-unlock-alt text-gray-400 w-6"></i>
                        <input type="password" id="login-pwd" value="123456" class="flex-1 text-lg py-1 px-2" placeholder="密码">
                    </div>
                    <button onclick="handleLogin()" class="w-full bg-[#07c160] text-white rounded py-3 mt-6 text-lg font-medium active:bg-[#06ad56] transition-colors">登录</button>
                </div>
            </div>
        </div>

        <!-- ==================== 主工作台 (会话列表 + 设置) ==================== -->
        <div id="view-main" class="page-view z-10" style="display: none;">
            
            <!-- === TAB 1: 会话列表 === -->
            <div id="tab-messages" class="w-full h-full flex flex-col absolute inset-0">
                <!-- 头部 -->

                    <div class="text-[17px] font-semibold text-wc-main flex items-center gap-2" id="header-status-toggle" onclick="toggleOnlineStatus()">
                        <span>消息</span>
                        <span id="status-dot" class="w-2.5 h-2.5 bg-green-500 rounded-full"></span>
                        <i class="fas fa-angle-down text-sm text-gray-500"></i>
                    </div>
                    
                    <div class="flex gap-4">
                        <!-- 模拟接收新消息测试按钮 -->
                        <i class="fas fa-plus-circle text-gray-700 text-xl cursor-pointer" onclick="simulateIncomingMessage()" title="模拟接收消息"></i>
                    </div>
                </header>

                <!-- 状态切换菜单 (隐藏) -->
                <div id="status-menu" class="absolute top-[50px] left-2 bg-white rounded shadow-lg border border-gray-200 z-30 hidden overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-100 flex items-center gap-2 cursor-pointer active:bg-gray-50" onclick="setStatus('online')">
                        <span class="w-2.5 h-2.5 bg-green-500 rounded-full"></span> 在线接待
                    </div>
                    <div class="px-4 py-3 border-b border-gray-100 flex items-center gap-2 cursor-pointer active:bg-gray-50" onclick="setStatus('busy')">
                        <span class="w-2.5 h-2.5 bg-red-500 rounded-full"></span> 忙碌 (勿扰)
                    </div>
                    <div class="px-4 py-3 flex items-center gap-2 cursor-pointer active:bg-gray-50" onclick="setStatus('offline')">
                        <span class="w-2.5 h-2.5 bg-gray-400 rounded-full"></span> 离线
                    </div>
                </div>

                <!-- 会话列表 -->
                <main class="flex-1 overflow-y-auto bg-white hide-scrollbar pb-[60px]" id="session-list">
                    <!-- 列表项通过 JS 渲染 -->
                </main>
            </div>

            <!-- === TAB 2: 设置页 === -->
            <div id="tab-settings" class="w-full h-full flex flex-col absolute inset-0 hidden bg-[#ededed]">
                <header class="h-[50px] bg-wc-header flex items-center justify-center px-4 pt-safe shrink-0 relative z-20 border-b border-wc">
                    <div class="text-[17px] font-semibold text-wc-main">系统设置</div>
                </header>
                
                <main class="flex-1 overflow-y-auto hide-scrollbar pb-[60px]">
                    <!-- 个人资料卡片 -->
                    <div class="bg-white p-5 flex items-center gap-4 mb-2 shadow-sm">
                        <img src="https://placehold.co/120x120/07c160/ffffff?text=服" class="w-16 h-16 rounded-lg object-cover">
                        <div class="flex-1 flex flex-col justify-center">
                            <span class="text-lg font-medium text-gray-800" id="setting-user-name">admin</span>
                            <span class="text-sm text-gray-500 mt-1">工号: KF-10086</span>
                        </div>
                    </div>

                    <!-- 通知设置组 -->
                    <div class="bg-white mb-2 shadow-sm">
                        <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                            <span class="text-[16px] text-gray-800">新消息提示音</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="toggle-sound" class="sr-only peer" checked onchange="toggleSetting('sound', this.checked)">
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#07c160]"></div>
                            </label>
                        </div>
                        <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                            <span class="text-[16px] text-gray-800">震动开关</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="toggle-vibrate" class="sr-only peer" checked onchange="toggleSetting('vibrate', this.checked)">
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#07c160]"></div>
                            </label>
                        </div>
                        <div class="px-4 py-3 flex justify-between items-center">
                            <span class="text-[16px] text-gray-800 flex flex-col">
                                <span>勿扰时段</span>
                                <span class="text-xs text-gray-400 mt-0.5">拦截新消息系统横幅与提示音</span>
                            </span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="toggle-dnd" class="sr-only peer" onchange="toggleSetting('dnd', this.checked)">
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#07c160]"></div>
                            </label>
                        </div>
                    </div>

                    <!-- 操作组 -->
                    <div class="bg-white mt-4 shadow-sm">
                        <div class="px-4 py-3 flex justify-center items-center active:bg-gray-50 cursor-pointer" onclick="handleLogout()">
                            <span class="text-[16px] text-red-500 font-medium">退出登录</span>
                        </div>
                    </div>
                </main>
            </div>

            <!-- 底部 Tab -->
            <footer class="h-[60px] bg-[#f7f7f7] border-t border-[#d5d5d5] absolute bottom-0 w-full flex items-center justify-around pb-safe z-20">
                <div class="flex flex-col items-center cursor-pointer text-[#07c160]" id="tab-btn-messages" onclick="switchTab('messages')">
                    <i class="fas fa-comment text-2xl relative">
                        <span id="total-unread" class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full border border-white">2</span>
                    </i>

                </div>
                <div class="flex flex-col items-center cursor-pointer text-gray-500 hover:text-gray-800" id="tab-btn-settings" onclick="switchTab('settings')">
                    <i class="fas fa-cog text-2xl"></i>
                    <span class="text-[10px] mt-1">设置</span>
                </div>
            </footer>
        </div>

        <!-- ==================== 聊天详情页 ==================== -->

                </div>
                <div class="flex-1 flex flex-col items-center">
                    <span id="chat-title" class="text-[17px] font-semibold text-wc-main">114.25.x.x</span>
                    <span id="chat-sub" class="text-[10px] text-orange-500">请求人工接管...</span>
                </div>
                <div class="w-16 flex items-center justify-end cursor-pointer" onclick="toggleProfile()">
                    <i class="fas fa-ellipsis-h text-xl text-gray-700"></i>

            </header>

            <main class="flex-1 overflow-y-auto p-4 space-y-5 hide-scrollbar pb-6 bg-wc-bg relative z-0" id="chat-history" onclick="closeChatPanels()">
                <!-- 聊天记录 JS 渲染 -->
            </main>

            <!-- 底部输入区 / 接管按钮 -->
            <footer class="bg-wc-footer border-t border-wc shrink-0 pb-safe relative z-20" id="chat-footer">
                
                <!-- 状态 1：需要接管时显示的大按钮 -->
                <div id="takeover-box" class="p-3 bg-white hidden">
                    <button class="w-full bg-[#07c160] text-white rounded py-2.5 font-medium active:bg-[#06ad56]" onclick="handleTakeover()">
                        接管会话 (结束 AI 托管)
                    </button>
                </div>

                <!-- 状态 2：正常聊天输入框 -->
                <div id="input-box" class="hidden flex-col">
                    <div class="min-h-[56px] px-2 py-2 flex items-end gap-2">
                        <!-- 表情按钮 -->
                        <div class="w-8 h-8 flex items-center justify-center shrink-0 mb-1 cursor-pointer" onclick="toggleChatPanel('emoji')">
                            <i class="far fa-smile text-3xl text-gray-700"></i>
                        </div>
                        
                        <!-- 输入框 -->
                        <div class="flex-1 bg-white rounded flex items-center border border-gray-300 min-h-[40px] mb-0.5">
                            <textarea id="chat-input" rows="1" class="w-full bg-transparent border-none resize-none px-2 py-2 text-[16px] leading-[22px] max-h-[100px] hide-scrollbar" style="height: 40px;"></textarea>
                        </div>
                        
                        <!-- 更多/发送 -->
                        <div id="btn-plus" class="w-8 h-8 flex items-center justify-center shrink-0 mb-1 cursor-pointer" onclick="toggleChatPanel('more')">
                            <i class="fas fa-plus-circle text-3xl text-gray-700"></i>
                        </div>
                        <div id="btn-send" class="h-8 bg-[#07c160] text-white px-3 rounded font-medium text-[14px] flex items-center justify-center shrink-0 mb-1 cursor-pointer active:bg-[#06ad56] hidden" onclick="handleSend()">
                            发送
                        </div>
                    </div>

                    <!-- 隐藏的表情面板 -->
                    <div id="panel-emoji" class="chat-panel h-0 bg-wc-footer border-t border-gray-200 overflow-hidden will-change-[height]">
                        <div class="p-4 grid grid-cols-8 gap-4 overflow-y-auto h-[250px] hide-scrollbar" id="emoji-container"></div>
                    </div>

                    <!-- 隐藏的更多功能面板 -->
                    <div id="panel-more" class="chat-panel h-0 bg-wc-footer border-t border-gray-200 overflow-hidden will-change-[height]">
                        <div class="p-6 grid grid-cols-4 gap-y-6 gap-x-2 h-[250px]">
                            <!-- 快捷回复 -->
                            <div class="flex flex-col items-center gap-1 cursor-pointer group" onclick="sendAction('shortcut')">
                                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm active:bg-gray-100">
                                    <i class="fas fa-bolt text-[24px] text-yellow-500"></i>
                                </div>
                                <span class="text-xs text-gray-500">快捷回复</span>
                            </div>
                            <!-- 发联系电话 -->
                            <div class="flex flex-col items-center gap-1 cursor-pointer group" onclick="sendAction('phone')">
                                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm active:bg-gray-100">
                                    <i class="fas fa-phone-alt text-[24px] text-blue-500"></i>
                                </div>
                                <span class="text-xs text-gray-500">发电话</span>
                            </div>
                            <!-- 发微信号 -->
                            <div class="flex flex-col items-center gap-1 cursor-pointer group" onclick="sendAction('wechat')">
                                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm active:bg-gray-100">
                                    <i class="fab fa-weixin text-[28px] text-[#07c160]"></i>
                                </div>
                                <span class="text-xs text-gray-500">发微信</span>
                            </div>
                            <!-- 结束会话 -->
                            <div class="flex flex-col items-center gap-1 cursor-pointer group" onclick="sendAction('end')">
                                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm active:bg-gray-100">
                                    <i class="fas fa-power-off text-[24px] text-red-500"></i>
                                </div>
                                <span class="text-xs text-gray-500">结束会话</span>
                            </div>
                        </div>
                    </div>
                </div>
            </footer>

            <!-- 访客资料侧边栏 (从右侧划出) -->
            <div id="profile-sidebar" class="absolute inset-0 bg-black/50 z-50 hidden justify-end">
                <div id="profile-content" class="w-[85%] bg-white h-full transform translate-x-full shadow-xl flex flex-col">
                    <header class="h-[50px] border-b flex items-center px-4 bg-gray-50">
                        <i class="fas fa-times text-xl text-gray-500 cursor-pointer" onclick="toggleProfile()"></i>
                        <span class="ml-4 font-medium text-gray-800">访客资料与管理</span>
                    </header>
                    <div class="flex-1 overflow-y-auto p-4 space-y-6">
                        <!-- 资料区 -->
                        <div>
                            <div class="text-xs text-gray-500 mb-2">基础信息</div>
                            <div class="bg-gray-50 rounded p-3 space-y-2 text-sm text-gray-700">
                                <div class="flex justify-between"><span>真实 IP</span> <span class="font-mono" id="prof-ip">114.25.10.22</span></div>
                                <div class="flex justify-between"><span>来源</span> <span>官网首页 PC 端</span></div>
                                <div class="flex justify-between"><span>发起时间</span> <span>2026-05-12 10:20</span></div>
                            </div>
                        </div>
                        <!-- 备注区 -->
                        <div>
                            <div class="text-xs text-gray-500 mb-2">修改备注</div>
                            <div class="flex gap-2">
                                <input type="text" id="prof-remark" class="flex-1 border rounded px-2 py-1.5 text-sm" placeholder="输入备注名">
                                <button class="bg-[#07c160] text-white px-3 rounded text-sm" onclick="saveRemark()">保存</button>
                            </div>
                        </div>
                        <!-- 操作区 -->
                        <div class="pt-4 border-t">
                            <button class="w-full bg-white border border-gray-300 text-gray-700 rounded py-2 text-sm mb-3">转接其他客服</button>
                            <button class="w-full bg-white border border-red-300 text-red-500 rounded py-2 text-sm" onclick="alert('拉黑功能开发中')">加入黑名单</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== 全局组件 ==================== -->
        
        <!-- App 前台顶部横幅通知 -->
        <div id="app-notify" class="absolute top-2 left-2 right-2 bg-white rounded-lg shadow-xl border border-gray-100 p-3 flex items-start gap-3 z-[100] transform -translate-y-24 transition-transform duration-300 cursor-pointer" onclick="handleNotifyClick()">
            <img src="https://placehold.co/40x40/ccc/fff?text=客" class="w-10 h-10 rounded">
            <div class="flex-1 overflow-hidden">
                <div class="flex justify-between items-center mb-1">
                    <span class="font-medium text-sm text-gray-800 line-clamp-1" id="notify-title">IP: 114.25...</span>
                    <span class="text-[10px] text-gray-400">刚刚</span>
                </div>
                <div class="text-xs text-gray-500 line-clamp-1" id="notify-desc">人工，你在吗？</div>
            </div>
        </div>

        <!-- 居中 Toast -->
        <div id="toast" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black/70 text-white text-[14px] px-4 py-2 rounded shadow-lg pointer-events-none opacity-0 z-[110]">
            提示
        </div>

        <audio id="sound-alert" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>
    </div>

    <script>
        // === 状态管理与数据模拟 ===
        const AppState = {
            status: 'online', // online, busy, offline
            currentChatId: null,
            activePanel: null,
            settings: { sound: true, vibrate: true, dnd: false }
        };

        // 模拟会话列表数据
        let sessions = [
            {
                id: 's1',
                remark: '意向客户-王总',
                ip: '220.181.38.148',
                status: 'HUMAN', // HUMAN, QUEUE, AI

            },

                    { isVisitor: false, text: '正在为您转接人工客服，请稍候...' }

            },
            {
                id: 's3',

                ip: '183.129.207.22',
                status: 'AI',
                lastMsg: '退款进度',
                time: '10:15',
                unread: 0,
                history: [
                    { isVisitor: true, text: '退款进度' },
                    { isVisitor: false, text: '您可以在【我的订单】-【售后】中查看进度。' }
                ]
            }
        ];

        // 常用 Emoji
        const EMOJIS = ['😀','😂','😊','😍','😒','😘','😁','😉','😎','😢','😡','👍','🙏','🤝'];

        // DOM Elements
        const DOM = {
            viewLogin: document.getElementById('view-login'),
            viewMain: document.getElementById('view-main'),
            viewChat: document.getElementById('view-chat'),

        function showToast(msg) {
            DOM.toast.textContent = msg;
            gsap.to(DOM.toast, { opacity: 1, duration: 0.2 });
            setTimeout(() => gsap.to(DOM.toast, { opacity: 0, duration: 0.3 }), 2000);
        }

        // ==================== 登录逻辑 ====================
        function handleLogin() {
            const user = document.getElementById('login-user').value || 'admin';
            document.getElementById('setting-user-name').textContent = user;
            showToast("登录成功");
            gsap.to(DOM.viewLogin, { y: '100%', duration: 0.4, ease: "power3.in", onComplete: () => {
                DOM.viewLogin.style.display = 'none';
                DOM.viewMain.style.display = 'flex';
                renderSessionList();
                requestNotificationPermission();
            }});
        }

        // ==================== 退出与 Tab 切换 ====================
        function switchTab(tabId) {
            const tMsg = document.getElementById('tab-messages');
            const tSet = document.getElementById('tab-settings');
            const bMsg = document.getElementById('tab-btn-messages');
            const bSet = document.getElementById('tab-btn-settings');

            if (tabId === 'messages') {
                tSet.classList.add('hidden');
                tMsg.classList.remove('hidden');
                bMsg.className = 'flex flex-col items-center cursor-pointer text-[#07c160]';
                bSet.className = 'flex flex-col items-center cursor-pointer text-gray-500 hover:text-gray-800';
            } else {
                tMsg.classList.add('hidden');
                tSet.classList.remove('hidden');
                bSet.className = 'flex flex-col items-center cursor-pointer text-[#07c160]';
                bMsg.className = 'flex flex-col items-center cursor-pointer text-gray-500 hover:text-gray-800';
            }
        }

        function toggleSetting(key, value) {
            AppState.settings[key] = value;
            showToast("设置已保存");
        }

        function handleLogout() {
            if(confirm("确定要退出登录吗？")) {
                DOM.viewMain.style.display = 'none';
                DOM.viewLogin.style.display = 'flex';
                gsap.to(DOM.viewLogin, { y: '0%', duration: 0.4, ease: "power3.out" });
                switchTab('messages'); // reset tab
                showToast("已安全退出");
            }
        }

        // ==================== 状态切换 ====================
        function toggleOnlineStatus() {
            DOM.statusMenu.classList.toggle('hidden');
        }

        function setStatus(status) {
            AppState.status = status;
            DOM.statusMenu.classList.add('hidden');
            const dot = document.getElementById('status-dot');
            dot.className = 'w-2.5 h-2.5 rounded-full ' + (status === 'online' ? 'bg-green-500' : status === 'busy' ? 'bg-red-500' : 'bg-gray-400');
            showToast(`状态切换为：${status === 'online' ? '在线' : status === 'busy' ? '忙碌(勿扰)' : '离线'}`);
        }

        // ==================== 列表渲染 ====================
        function renderSessionList() {
            DOM.sessionList.innerHTML = '';
            let total = 0;

            sessions.forEach(session => {
                total += session.unread;
                
                // 构建状态标签
                let tagHtml = '';
                if (session.status === 'QUEUE') tagHtml = `<span class="bg-orange-100 text-orange-600 px-1 rounded text-[10px] ml-1 border border-orange-200">排队中</span>`;
                else if (session.status === 'AI') tagHtml = `<span class="bg-blue-100 text-blue-600 px-1 rounded text-[10px] ml-1 border border-blue-200">AI接待</span>`;
                
                // 未读红点
                const unreadHtml = session.unread > 0 ? `<span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full border-2 border-white">${session.unread}</span>` : '';

                const div = document.createElement('div');
                div.className = 'flex items-center p-3 border-b border-gray-100 active:bg-gray-50 cursor-pointer';
                div.onclick = () => openChat(session.id);
                div.innerHTML = `
                    <div class="relative w-12 h-12 shrink-0">
                        <img src="https://placehold.co/80x80/cccccc/ffffff?text=客" class="w-full h-full rounded" alt="avatar">
                        ${unreadHtml}
                    </div>
                    <div class="ml-3 flex-1 overflow-hidden flex flex-col justify-center h-12">
                        <div class="flex justify-between items-center mb-1">
                            <div class="font-medium text-[16px] text-gray-900 line-clamp-1 break-all flex items-center">
                                ${session.remark} ${tagHtml}
                            </div>
                            <span class="text-xs text-gray-400 shrink-0 ml-2">${session.time}</span>
                        </div>
                        <div class="text-[13px] text-gray-500 line-clamp-1 w-[90%]">
                            ${session.lastMsg}
                        </div>
                    </div>
                `;
                DOM.sessionList.appendChild(div);
            });

            document.getElementById('total-unread').textContent = total;
            document.getElementById('total-unread').style.display = total > 0 ? 'flex' : 'none';
        }

        // ==================== 打开聊天详情 ====================
        function openChat(id) {
            const session = sessions.find(s => s.id === id);
            if (!session) return;
            
            AppState.currentChatId = id;
            session.unread = 0; // 清除未读
            renderSessionList();

            // 设置 Header
            document.getElementById('chat-title').textContent = session.remark;
            
            const sub = document.getElementById('chat-sub');
            if (session.status === 'QUEUE') {
                sub.textContent = '请求人工接管...';
                sub.className = 'text-[10px] text-orange-500';
            } else if (session.status === 'AI') {
                sub.textContent = 'AI 自动接待中';
                sub.className = 'text-[10px] text-blue-500';
            } else {
                sub.textContent = '人工在线';
                sub.className = 'text-[10px] text-green-500';
            }

            // 设置底部区域
            const takeBox = document.getElementById('takeover-box');
            const inputBox = document.getElementById('input-box');
            if (session.status === 'QUEUE' || session.status === 'AI') {
                takeBox.classList.remove('hidden');
                inputBox.classList.remove('flex');
                inputBox.classList.add('hidden');
            } else {
                takeBox.classList.add('hidden');
                inputBox.classList.remove('hidden');
                inputBox.classList.add('flex');
            }

            // 渲染历史
            DOM.chatHistory.innerHTML = '';
            session.history.forEach(msg => appendMsg(msg.text, msg.isVisitor));

            // 动画推入
            DOM.viewChat.style.display = 'flex';
            gsap.to(DOM.viewChat, { x: '0%', duration: 0.3, ease: "power2.out" });
            scrollToBottom();
        }

        function closeChat() {
            AppState.currentChatId = null;
            closeChatPanels();
            gsap.to(DOM.viewChat, { x: '100%', duration: 0.3, ease: "power2.in", onComplete: () => {
                DOM.viewChat.style.display = 'none';
            }});
        }

        // 渲染单条消息 (注意角色反转：左侧白底访客，右侧绿底客服)
        function appendMsg(text, isVisitor = false) {
            const avatar = isVisitor ? 'https://placehold.co/80x80/cccccc/ffffff?text=客' : 'https://placehold.co/80x80/07c160/ffffff?text=我';
            const bubbleBg = isVisitor ? 'bg-wc-visitor border border-gray-200/50' : 'bg-wc-self';
            const bubbleDir = isVisitor ? 'bubble-left' : 'bubble-right';
            const alignClass = isVisitor ? 'items-start' : 'items-end';
            const rowClass = isVisitor ? 'flex-row' : 'flex-row-reverse';

            const html = `
                <div class="flex gap-3 ${rowClass}">
                    <img src="${avatar}" class="w-10 h-10 rounded shrink-0 object-cover" alt="Avatar">
                    <div class="flex flex-col max-w-[70%] ${alignClass}">
                        <div class="${bubbleBg} text-wc-main text-[16px] p-2.5 rounded-lg shadow-sm relative ${bubbleDir} leading-relaxed word-break-all min-h-[40px] flex items-center">
                            ${text}
                        </div>
                    </div>
                </div>
            `;
            
            const div = document.createElement('div');
            div.innerHTML = html.trim();
            DOM.chatHistory.appendChild(div.firstElementChild);
            scrollToBottom();
        }

        function scrollToBottom() {
            setTimeout(() => { DOM.chatHistory.scrollTop = DOM.chatHistory.scrollHeight; }, 50);
        }

        // ==================== 输入与发送 ====================
        DOM.chatInput.addEventListener('input', function() {
            this.style.height = '40px';
            this.style.height = (this.scrollHeight) + 'px';
            
            if (this.value.trim().length > 0) {
                DOM.btnPlus.style.display = 'none';
                DOM.btnSend.style.display = 'flex';
                DOM.btnSend.classList.remove('hidden');
            } else {
                DOM.btnPlus.style.display = 'flex';
                DOM.btnSend.style.display = 'none';
                DOM.btnSend.classList.add('hidden');
            }
        });

        function handleSend(manualText = null) {
            const text = manualText || DOM.chatInput.value.trim();
            if (!text) return;

            const session = sessions.find(s => s.id === AppState.currentChatId);
            if(!session) return;

            // 清空输入
            if(!manualText) {
                DOM.chatInput.value = '';
                DOM.chatInput.style.height = '40px';
                DOM.btnPlus.style.display = 'flex';
                DOM.btnSend.classList.add('hidden');
                closeChatPanels();
            }

            // 添加到历史并渲染
            session.history.push({ isVisitor: false, text: text });
            session.lastMsg = text;
            appendMsg(text, false);
            
            // 模拟失败情况
            if (Math.random() < 0.05) {
                showToast("网络不稳定，消息发送失败 (模拟)");
                // 实际应在节点旁加感叹号
            }
        }

        function handleTakeover() {
            const session = sessions.find(s => s.id === AppState.currentChatId);
            if(!session) return;
            session.status = 'HUMAN';
            document.getElementById('chat-sub').textContent = '人工在线';
            document.getElementById('chat-sub').className = 'text-[10px] text-green-500';
            
            document.getElementById('takeover-box').classList.add('hidden');
            document.getElementById('input-box').classList.remove('hidden');
            document.getElementById('input-box').classList.add('flex');
            
            appendMsg("您好，我是人工客服，很高兴为您服务。", false);
            renderSessionList();
        }

        // ==================== 底部面板逻辑 ====================
        function toggleChatPanel(panel) {
            const pEmoji = document.getElementById('panel-emoji');
            const pMore = document.getElementById('panel-more');
            
            if (AppState.activePanel === panel) {
                closeChatPanels();
            } else {
                AppState.activePanel = panel;
                if (panel === 'emoji') {
                    gsap.to(pMore, { height: 0, duration: 0.2 });
                    gsap.to(pEmoji, { height: 250, duration: 0.3, ease: "power2.out" });
                } else {
                    gsap.to(pEmoji, { height: 0, duration: 0.2 });
                    gsap.to(pMore, { height: 250, duration: 0.3, ease: "power2.out" });
                }
                scrollToBottom();
            }
        }

        function closeChatPanels() {
            AppState.activePanel = null;
            gsap.to('.chat-panel', { height: 0, duration: 0.2 });
        }

        function sendAction(action) {
            closeChatPanels();
            if (action === 'shortcut') {
                handleSend("您好，请问有什么可以帮您的？请详细描述您的问题。");
            } else if (action === 'phone') {
                handleSend("您可以拨打我们的热线：400-123-4567");
            } else if (action === 'wechat') {
                handleSend("您可以添加官方微信号：Service999 进行联系。");
            } else if (action === 'end') {
                if(confirm("确定结束当前会话吗？")) {
                    closeChat();
                    showToast("会话已结束");
                }
            }
        }

        // 初始化 Emoji
        EMOJIS.forEach(emo => {
            const span = document.createElement('span');
            span.className = 'text-2xl cursor-pointer text-center hover:bg-gray-200 py-1 rounded';
            span.textContent = emo;
            span.onclick = () => { DOM.chatInput.value += emo; DOM.chatInput.dispatchEvent(new Event('input')); };
            document.getElementById('emoji-container').appendChild(span);
        });

        // ==================== 访客资料侧边栏 ====================
        function toggleProfile() {
            const isOpen = !DOM.profSidebar.classList.contains('hidden');
            if (isOpen) {
                gsap.to(DOM.profContent, { x: '100%', duration: 0.3, ease: "power2.in", onComplete: () => DOM.profSidebar.classList.add('hidden') });
            } else {
                const session = sessions.find(s => s.id === AppState.currentChatId);
                document.getElementById('prof-ip').textContent = session.ip;
                document.getElementById('prof-remark').value = session.remark !== session.ip ? session.remark : '';
                
                DOM.profSidebar.classList.remove('hidden');
                DOM.profSidebar.classList.add('flex');
                gsap.to(DOM.profContent, { x: '0%', duration: 0.3, ease: "power2.out" });
            }
        }

        function saveRemark() {
            const val = document.getElementById('prof-remark').value.trim();
            const session = sessions.find(s => s.id === AppState.currentChatId);
            if (val && session) {
                session.remark = val;
                document.getElementById('chat-title').textContent = val;
                renderSessionList();
                showToast("备注保存成功");
                toggleProfile();
            }
        }

        // ==================== 强通知系统 (App 级别) ====================
        
        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        // 模拟接收新消息
        function simulateIncomingMessage() {
            if (AppState.status === 'offline') {
                showToast("离线状态无法接收新消息");
                return;
            }

            // 给队列中排队的访客加一条消息
            const targetSession = sessions[1]; 
            targetSession.history.push({ isVisitor: true, text: "有人在吗？麻烦快一点！" });
            targetSession.lastMsg = "有人在吗？麻烦快一点！";
            targetSession.unread += 1;
            
            // 如果不在当前会话内
            if (AppState.currentChatId !== targetSession.id) {
                triggerAppNotification(targetSession.remark, targetSession.lastMsg, targetSession.id);
            } else {
                // 如果正处于该聊天页面
                appendMsg(targetSession.lastMsg, true);
                if (AppState.status !== 'busy' && AppState.settings.sound) DOM.sound.play().catch(()=>{});
            }
            renderSessionList();
        }

        let notifyTimeout;
        function triggerAppNotification(title, text, sessionId) {
            if (AppState.status === 'busy' || AppState.settings.dnd) return; // 勿扰模式不弹窗不响铃

            // 1. 播放声音
            if (AppState.settings.sound) {
                DOM.sound.currentTime = 0;
                DOM.sound.play().catch(()=>{});
            }
            
            // 2. 触发系统震动 (需设备和浏览器支持)
            if (AppState.settings.vibrate && navigator.vibrate) {
                navigator.vibrate([200, 100, 200]);
            }

            // 3. HTML5 系统通知 (后台通知)
            if ("Notification" in window && Notification.permission === "granted" && document.hidden) {
                new Notification(title, { body: text, icon: 'https://placehold.co/100x100/07c160/fff?text=Msg' });
            }

            // 4. App 内顶部横幅 (前台通知)
            document.getElementById('notify-title').textContent = title;
            document.getElementById('notify-desc').textContent = text;
            DOM.notify.dataset.sid = sessionId; // 记录点击要跳去的会话

            gsap.to(DOM.notify, { y: 0, duration: 0.4, ease: "back.out(1.2)" });
            
            clearTimeout(notifyTimeout);
            notifyTimeout = setTimeout(() => {
                gsap.to(DOM.notify, { y: -100, duration: 0.3, ease: "power2.in" });
            }, 3000);
        }

        function handleNotifyClick() {
            const sid = DOM.notify.dataset.sid;
            gsap.to(DOM.notify, { y: -100, duration: 0.2 });
            if (sid) {
                openChat(sid);
            }
        }

    </script>
</body>
</html>
